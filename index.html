<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>오늘의 병무 소식 - AI 음성 브리핑</title>
    <!-- Google Fonts: Outfit & Noto Sans KR -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <!-- FontAwesome for Premium Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0b132b, #1c2541, #3a506b);
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --glass-shadow: rgba(0, 0, 0, 0.4);
            --primary: #48cae4;
            --primary-hover: #90e0ef;
            --accent: #5bc0be;
            --text-main: #f8f9fa;
            --text-muted: #adb5bd;
            --card-radius: 20px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Noto Sans KR', sans-serif;
            background: var(--bg-gradient);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
        }

        /* 메인 컨테이너 */
        .container {
            width: 100%;
            max-width: 680px;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: var(--card-radius);
            box-shadow: 0 20px 50px var(--glass-shadow);
            padding: 35px;
            transition: transform 0.3s ease;
        }

        /* 헤더 스타일 */
        header {
            text-align: center;
            margin-bottom: 30px;
        }

        header .logo-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(72, 202, 228, 0.15);
            border: 1px solid rgba(72, 202, 228, 0.3);
            padding: 6px 16px;
            border-radius: 50px;
            font-size: 0.85rem;
            color: var(--primary);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 15px;
        }

        header h1 {
            font-family: 'Outfit', 'Noto Sans KR', sans-serif;
            font-size: 2.1rem;
            font-weight: 800;
            background: linear-gradient(to right, #ffffff, var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
        }

        header .date-text {
            font-size: 0.95rem;
            color: var(--text-muted);
            letter-spacing: 0.5px;
        }

        /* 플레이어 레이아웃 */
        .player-card {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: 16px;
            padding: 25px;
            margin-bottom: 30px;
            position: relative;
            overflow: hidden;
        }

        /* 오디오 웨이브 시각화 (CSS 애니메이션) */
        .wave-container {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            gap: 4px;
            height: 40px;
            margin-bottom: 20px;
        }

        .wave-bar {
            width: 4px;
            height: 5px;
            background-color: var(--primary);
            border-radius: 2px;
            transition: height 0.15s ease;
        }

        /* 오디오가 실행될 때 적용될 애니메이션 */
        .playing .wave-bar {
            animation: bounce 1s infinite alternate;
        }

        .playing .wave-bar:nth-child(2n) { animation-delay: 0.1s; animation-duration: 0.8s; }
        .playing .wave-bar:nth-child(3n) { animation-delay: 0.25s; animation-duration: 1.2s; }
        .playing .wave-bar:nth-child(4n) { animation-delay: 0.4s; animation-duration: 0.9s; }
        .playing .wave-bar:nth-child(5n) { animation-delay: 0.15s; animation-duration: 1.1s; }

        @keyframes bounce {
            0% { height: 5px; }
            100% { height: 35px; }
        }

        /* 타임라인 바 */
        .progress-area {
            margin-bottom: 20px;
        }

        .progress-bar-wrapper {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            position: relative;
            cursor: pointer;
        }

        .progress-bar-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(to right, var(--accent), var(--primary));
            border-radius: 10px;
            position: absolute;
            top: 0;
            left: 0;
            transition: width 0.1s linear;
        }

        .time-info {
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: 8px;
            font-family: 'Outfit', sans-serif;
        }

        /* 플레이어 버튼 제어부 */
        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 25px;
            margin-bottom: 10px;
        }

        .ctrl-btn {
            background: none;
            border: none;
            color: var(--text-main);
            cursor: pointer;
            outline: none;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .ctrl-btn:hover {
            color: var(--primary);
            transform: scale(1.08);
        }

        .ctrl-btn.secondary {
            font-size: 1.2rem;
            color: var(--text-muted);
        }

        .ctrl-btn.main-play {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, var(--accent), var(--primary));
            border-radius: 50%;
            font-size: 1.6rem;
            box-shadow: 0 8px 20px rgba(72, 202, 228, 0.3);
            color: #0b132b;
        }

        .ctrl-btn.main-play:hover {
            transform: scale(1.08);
            box-shadow: 0 8px 25px rgba(72, 202, 228, 0.5);
            color: #0b132b;
        }

        /* 속도 제어 버튼 */
        .speed-badge {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid var(--glass-border);
            padding: 4px 10px;
            border-radius: 30px;
            font-size: 0.75rem;
            font-family: 'Outfit', sans-serif;
            font-weight: 600;
            color: var(--text-muted);
            cursor: pointer;
            user-select: none;
            transition: all 0.2s ease;
        }

        .speed-badge:hover {
            background: rgba(72, 202, 228, 0.15);
            color: var(--primary);
            border-color: rgba(72, 202, 228, 0.3);
        }

        /* 브리핑 텍스트 및 카드 레이아웃 */
        .content-section {
            margin-top: 35px;
        }

        .section-title {
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--primary);
            border-bottom: 2px solid rgba(72, 202, 228, 0.2);
            padding-bottom: 8px;
        }

        .script-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 20px;
            line-height: 1.7;
            font-size: 0.98rem;
            color: #e5e5e5;
            white-space: pre-wrap;
            margin-bottom: 30px;
            max-height: 250px;
            overflow-y: auto;
        }

        .script-card::-webkit-scrollbar {
            width: 6px;
        }

        .script-card::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
        }

        /* 뉴스 기사 리스트 */
        .news-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .news-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 12px;
            padding: 18px;
            transition: all 0.2s ease;
        }

        .news-card:hover {
            transform: translateY(-2px);
            border-color: rgba(72, 202, 228, 0.25);
            background: rgba(255, 255, 255, 0.05);
        }

        .news-card h3 {
            font-size: 1.05rem;
            font-weight: 700;
            margin-bottom: 8px;
            line-height: 1.4;
        }

        .news-card h3 a {
            color: var(--text-main);
            text-decoration: none;
            transition: color 0.2s;
        }

        .news-card h3 a:hover {
            color: var(--primary);
        }

        .news-card p {
            font-size: 0.9rem;
            color: var(--text-muted);
            line-height: 1.5;
            margin-bottom: 12px;
        }

        .news-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.4);
        }

        .news-meta a.read-more {
            color: var(--accent);
            text-decoration: none;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        .news-meta a.read-more:hover {
            text-decoration: underline;
            color: var(--primary);
        }

        /* 로딩 딤 처리 */
        .loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0b132b;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            border-radius: var(--card-radius);
            transition: opacity 0.5s ease;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(72, 202, 228, 0.1);
            border-left-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s infinite linear;
            margin-bottom: 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* 반응형 모바일 최적화 */
        @media (max-width: 600px) {
            body {
                padding: 10px;
            }
            .container {
                padding: 20px 15px;
                border-radius: 16px;
            }
            header h1 {
                font-size: 1.6rem;
            }
            .controls {
                gap: 15px;
            }
            .ctrl-btn.main-play {
                width: 50px;
                height: 50px;
                font-size: 1.3rem;
            }
            .script-card {
                padding: 15px;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>

    <div class="container" style="position: relative;">
        <!-- 로딩 화면 -->
        <div id="loading" class="loading-overlay">
            <div class="spinner"></div>
            <p style="color: var(--text-muted); font-size: 0.9rem;">최신 AI 브리핑 불러오는 중...</p>
        </div>

        <header>
            <div class="logo-badge">
                <i class="fa-solid fa-microphone-lines"></i> Military News Radio
            </div>
            <h1 id="page-title">오늘의 병무 소식</h1>
            <div class="date-text" id="page-date">로딩 중...</div>
        </header>

        <!-- 음성 플레이어 카드 -->
        <div class="player-card" id="player-container">
            <!-- 웨이브 바 (16개 구성) -->
            <div class="wave-container" id="visualizer">
                <div class="wave-bar"></div>
                <div class="wave-bar"></div>
                <div class="wave-bar"></div>
                <div class="wave-bar"></div>
                <div class="wave-bar"></div>
                <div class="wave-bar"></div>
                <div class="wave-bar"></div>
                <div class="wave-bar"></div>
                <div class="wave-bar"></div>
                <div class="wave-bar"></div>
                <div class="wave-bar"></div>
                <div class="wave-bar"></div>
                <div class="wave-bar"></div>
                <div class="wave-bar"></div>
                <div class="wave-bar"></div>
                <div class="wave-bar"></div>
            </div>

            <!-- 숨겨진 HTML 오디오 객체 -->
            <audio id="main-audio" src="briefing.mp3" preload="metadata"></audio>

            <!-- 타임라인 -->
            <div class="progress-area">
                <div class="progress-bar-wrapper" id="progress-wrapper">
                    <div class="progress-bar-fill" id="progress-fill"></div>
                </div>
                <div class="time-info">
                    <span id="current-time">0:00</span>
                    <span id="duration">0:00</span>
                </div>
            </div>

            <!-- 플레이어 버튼 부 -->
            <div class="controls">
                <!-- 10초 전 -->
                <button class="ctrl-btn secondary" id="skip-back" title="10초 뒤로">
                    <i class="fa-solid fa-backward-step"></i>
                </button>
                <!-- 재생 / 일시정지 -->
                <button class="ctrl-btn main-play" id="play-pause" title="재생">
                    <i class="fa-solid fa-play" id="play-icon"></i>
                </button>
                <!-- 10초 후 -->
                <button class="ctrl-btn secondary" id="skip-forward" title="10초 앞으로">
                    <i class="fa-solid fa-forward-step"></i>
                </button>
                <!-- 배속 설정 -->
                <div class="speed-badge" id="speed-ctrl" title="배속 조절">1.0x</div>
            </div>
        </div>

        <!-- 브리핑 스크립트 색션 -->
        <div class="content-section">
            <h2 class="section-title">
                <i class="fa-solid fa-file-waveform"></i> 브리핑 요약문
            </h2>
            <div class="script-card" id="briefing-script">
                요약을 불러오고 있습니다...
            </div>
        </div>

        <!-- 수집된 원본 뉴스 색션 -->
        <div class="content-section">
            <h2 class="section-title">
                <i class="fa-solid fa-newspaper"></i> 관련 주요 뉴스
            </h2>
            <div class="news-list" id="briefing-news-list">
                <!-- 동적으로 기사 삽입 -->
            </div>
        </div>
    </div>

    <script>
        const audio = document.getElementById('main-audio');
        const playPauseBtn = document.getElementById('play-pause');
        const playIcon = document.getElementById('play-icon');
        const progressWrapper = document.getElementById('progress-wrapper');
        const progressFill = document.getElementById('progress-fill');
        const currentTimeEl = document.getElementById('current-time');
        const durationEl = document.getElementById('duration');
        const skipBackBtn = document.getElementById('skip-back');
        const skipForwardBtn = document.getElementById('skip-forward');
        const speedCtrlBtn = document.getElementById('speed-ctrl');
        const playerContainer = document.getElementById('player-container');
        const visualizer = document.getElementById('visualizer');

        // 배속 상태 어레이
        const speeds = [1.0, 1.2, 1.5, 2.0];
        let currentSpeedIdx = 0;

        // 1. data.json 파일 페치 및 렌더링
        window.addEventListener('DOMContentLoaded', () => {
            fetch('data.json')
                .then(response => {
                    if (!response.ok) {
                        throw new Error('데이터 파일을 불러올 수 없습니다.');
                    }
                    return response.json();
                })
                .then(data => {
                    // 데이터 바인딩
                    document.getElementById('page-date').innerText = `${data.date || '오늘'}의 신선한 소식`;
                    document.getElementById('briefing-script').innerText = data.tts_script || '음성 브리핑 대본이 없습니다.';
                    
                    const newsListContainer = document.getElementById('briefing-news-list');
                    newsListContainer.innerHTML = ''; // 초기화
                    
                    const newsList = data.news_list || [];
                    if (newsList.length === 0) {
                        newsListContainer.innerHTML = '<p style="color: var(--text-muted); font-size: 0.9rem; text-align: center; padding: 20px;">어제 하루 동안 생성된 병무 뉴스가 없습니다.</p>';
                    } else {
                        newsList.forEach(news => {
                            const card = document.createElement('div');
                            card.className = 'news-card';
                            card.innerHTML = `
                                <h3><a href="${news.link}" target="_blank" rel="noopener noreferrer">${news.title}</a></h3>
                                <p>${news.description}</p>
                                <div class="news-meta">
                                    <span><i class="fa-regular fa-clock"></i> ${news.pubDate}</span>
                                    <a href="${news.link}" target="_blank" rel="noopener noreferrer" class="read-more">원문 기사 <i class="fa-solid fa-angle-right"></i></a>
                                </div>
                            `;
                            newsListContainer.appendChild(card);
                        });
                    }
                    
                    // 로딩 제거
                    const loading = document.getElementById('loading');
                    loading.style.opacity = 0;
                    setTimeout(() => loading.style.display = 'none', 500);
                })
                .catch(err => {
                    console.error(err);
                    document.getElementById('page-date').innerText = '데이터 로드 오류';
                    document.getElementById('briefing-script').innerText = '데이터를 불러오는 도중 오류가 발생했습니다. 잠시 후 새로고침해 주세요.';
                    document.getElementById('loading').style.display = 'none';
                });
        });

        // 2. 맞춤형 커스텀 오디오 재생 컨트롤
        
        // 재생 & 일시정지 토글
        function togglePlay() {
            if (audio.paused) {
                audio.play();
                playIcon.className = 'fa-solid fa-pause';
                visualizer.classList.add('playing');
            } else {
                audio.pause();
                playIcon.className = 'fa-solid fa-play';
                visualizer.classList.remove('playing');
            }
        }

        playPauseBtn.addEventListener('click', togglePlay);

        // 오디오 타임라인 업데이트
        audio.addEventListener('timeupdate', () => {
            const current = audio.currentTime;
            const total = audio.duration;
            
            if (!isNaN(total)) {
                const pct = (current / total) * 100;
                progressFill.style.width = `${pct}%`;
                
                // 시간 텍스트 포맷 (M:SS)
                currentTimeEl.innerText = formatTime(current);
            }
        });

        // 메타데이터 로드 시 오디오 총시간 세팅
        audio.addEventListener('loadedmetadata', () => {
            durationEl.innerText = formatTime(audio.duration);
        });

        // 재생이 끝났을 때 원상태 복귀
        audio.addEventListener('ended', () => {
            playIcon.className = 'fa-solid fa-play';
            visualizer.classList.remove('playing');
            progressFill.style.width = '0%';
            currentTimeEl.innerText = '0:00';
        });

        // 시간 포맷 가공 유틸
        function formatTime(secs) {
            const mins = Math.floor(secs / 60);
            const remainSecs = Math.floor(secs % 60);
            return `${mins}:${remainSecs < 10 ? '0' : ''}${remainSecs}`;
        }

        // 재생 바 드래그 / 클릭 이동
        progressWrapper.addEventListener('click', (e) => {
            const totalWidth = progressWrapper.clientWidth;
            const clickX = e.offsetX;
            const totalDuration = audio.duration;
            
            if (!isNaN(totalDuration)) {
                audio.currentTime = (clickX / totalWidth) * totalDuration;
            }
        });

        // 10초 뒤로 건너뛰기
        skipBackBtn.addEventListener('click', () => {
            audio.currentTime = Math.max(0, audio.currentTime - 10);
        });

        // 10초 앞으로 건너뛰기
        skipForwardBtn.addEventListener('click', () => {
            if (!isNaN(audio.duration)) {
                audio.currentTime = Math.min(audio.duration, audio.currentTime + 10);
            }
        });

        // 배속 순환 조절
        speedCtrlBtn.addEventListener('click', () => {
            currentSpeedIdx = (currentSpeedIdx + 1) % speeds.length;
            const selectedSpeed = speeds[currentSpeedIdx];
            audio.playbackRate = selectedSpeed;
            speedCtrlBtn.innerText = `${selectedSpeed.toFixed(1)}x`;
            
            // 배속별 시각 피드백
            if (selectedSpeed > 1.0) {
                speedCtrlBtn.style.color = 'var(--primary)';
                speedCtrlBtn.style.borderColor = 'rgba(72, 202, 228, 0.4)';
            } else {
                speedCtrlBtn.style.color = 'var(--text-muted)';
                speedCtrlBtn.style.borderColor = 'var(--glass-border)';
            }
        });
    </script>
</body>
</html>
