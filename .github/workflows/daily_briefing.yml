name: Daily Alternative Service News Briefing Pipeline (V4 - Self-Hosted Codex)

on:
  schedule:
    - cron: '0 22 * * *' # 매일 한국 시간 아침 7시 (UTC 22:00) 자동 트리거
  repository_dispatch:
    types: [trigger_daily_briefing]
  workflow_dispatch: # 수동 기동 지원

permissions:
  contents: write # gh-pages 브랜치 배포에 필수적 권한

jobs:
  # 작업 1: 로컬 self-hosted runner에서 뉴스 수집, Codex 요약, 음성 생성 및 웹 플레이어 배포
  build-and-deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Briefing Pipeline Script with Codex
        env:
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          CODEX_TIMEOUT_SECONDS: "600"
        run: |
          python app.py

      - name: Deploy to GitHub Pages
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"

          function Invoke-Git {
            git @args
            if ($LASTEXITCODE -ne 0) {
              throw "git $($args -join ' ') failed with exit code $LASTEXITCODE"
            }
          }

          Invoke-Git config user.name "github-actions[bot]"
          Invoke-Git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          $deployBranch = "gh-pages-deploy-$env:GITHUB_RUN_ID"
          $pagesDir = Join-Path $env:RUNNER_TEMP $deployBranch
          $runnerTemp = [System.IO.Path]::GetFullPath($env:RUNNER_TEMP)
          $resolvedPagesDir = [System.IO.Path]::GetFullPath($pagesDir)

          if (-not $resolvedPagesDir.StartsWith($runnerTemp, [System.StringComparison]::OrdinalIgnoreCase)) {
            throw "Refusing to use deploy directory outside RUNNER_TEMP: $resolvedPagesDir"
          }

          if (Test-Path -LiteralPath $resolvedPagesDir) {
            Remove-Item -LiteralPath $resolvedPagesDir -Recurse -Force
          }

          Invoke-Git fetch origin gh-pages
          Invoke-Git worktree add -B $deployBranch $resolvedPagesDir origin/gh-pages

          try {
            Copy-Item -LiteralPath index.html -Destination $resolvedPagesDir -Force
            Copy-Item -LiteralPath data.json -Destination $resolvedPagesDir -Force
            Copy-Item -LiteralPath briefing.mp3 -Destination $resolvedPagesDir -Force

            Push-Location $resolvedPagesDir
            Invoke-Git add index.html data.json briefing.mp3

            git diff --cached --quiet
            $diffExitCode = $LASTEXITCODE

            if ($diffExitCode -eq 0) {
              Write-Host "No GitHub Pages asset changes to deploy."
            } elseif ($diffExitCode -eq 1) {
              Invoke-Git commit -m "chore: 매일 아침 대체복무 소식 최신 음성 브리핑 업로드"
              Invoke-Git push origin HEAD:gh-pages
            } else {
              throw "git diff --cached --quiet failed with exit code $diffExitCode"
            }
          } finally {
            if ((Get-Location).Path -eq $resolvedPagesDir) {
              Pop-Location
            }
            git worktree remove $resolvedPagesDir --force
            git branch -D $deployBranch
          }

  # 작업 2: 사용자의 로컬 윈도우 PC(Self-Hosted Runner)에서 직접 구동하여 카카오톡 전송
  send-kakaotalk:
    needs: build-and-deploy # 빌드 및 배포가 완료된 직후 실행
    runs-on: self-hosted # 윈도우 로컬 러너 지목
    steps:
      - name: Checkout latest code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 히스토리 전체 조회하여 최신 업데이트 가져오기

      - name: Pull latest gh-pages assets
        run: |
          # gh-pages 브랜치에 배포된 data.json 데이터를 가져오기 위해 저장소 싱크
          git fetch origin gh-pages
          git checkout origin/gh-pages -- data.json
        continue-on-error: true # 혹시나 싱크 에러 시 로컬 캐시 사용하도록 보완

      - name: Send KakaoTalk Message
        env:
          KAKAOTALK_ROOM_NAME: ${{ secrets.KAKAOTALK_ROOM_NAME }}
        run: |
          python -m pip install pywin32 pyperclip --quiet
          python app_local_sender.py
