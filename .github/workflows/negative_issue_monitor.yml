name: Negative Issue Monitor

on:
  repository_dispatch:
    types: [trigger_negative_issue_scan]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: negative-issue-monitor-main
  cancel-in-progress: false

jobs:
  scan-and-alert:
    runs-on: self-hosted
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          npm.cmd install -g mcporter

      - name: Configure PlayMCP credentials
        shell: powershell
        env:
          MCPORTER_CONFIG_JSON: ${{ secrets.MCPORTER_CONFIG_JSON }}
          MCPORTER_CREDENTIALS_JSON: ${{ secrets.MCPORTER_CREDENTIALS_JSON }}
        run: |
          $ErrorActionPreference = "Stop"
          if (-not $env:MCPORTER_CONFIG_JSON -or -not $env:MCPORTER_CREDENTIALS_JSON) {
            throw "PlayMCP mcporter secrets are missing."
          }
          $mcporterDir = Join-Path $env:USERPROFILE ".mcporter"
          New-Item -ItemType Directory -Force -Path $mcporterDir | Out-Null
          [System.IO.File]::WriteAllText((Join-Path $mcporterDir "mcporter.json"), $env:MCPORTER_CONFIG_JSON, [System.Text.UTF8Encoding]::new($false))
          [System.IO.File]::WriteAllText((Join-Path $mcporterDir "credentials.json"), $env:MCPORTER_CREDENTIALS_JSON, [System.Text.UTF8Encoding]::new($false))

      - name: Run negative issue detector
        env:
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          NEGATIVE_ISSUE_ANALYZER: codex
          CODEX_TIMEOUT_SECONDS: "600"
          NEGATIVE_ALERT_SEND_MODE: playmcp
          NEGATIVE_LOOKBACK_HOURS: "6"
          NEGATIVE_SUPPRESS_HOURS: "8"
          NEGATIVE_MAX_ALERTS: "3"
        run: |
          python negative_issue_detector.py

      - name: Commit monitor state
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git pull --rebase --autostash origin main
          git add negative_issue_state.json
          git diff --cached --quiet
          if ($LASTEXITCODE -eq 0) {
            Write-Host "No negative issue state changes."
            exit 0
          }
          if ($LASTEXITCODE -ne 1) {
            throw "git diff --cached --quiet failed with exit code $LASTEXITCODE"
          }
          git commit -m "chore: update negative issue monitor state"
          git push origin HEAD:main
